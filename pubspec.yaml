name: pixxgram_app
description: Kenya's Premier Photography Platform by Heinz Ateng' 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.0.0
  http: ^1.2.1
  flutter_dotenv: ^5.0.2

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # UI Components
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0

  # Date & Time
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # File Handling
  http_parser: ^4.0.2
  mime: ^1.0.5
  file_picker: ^8.1.2

  # Notifications & Alerts
  fluttertoast: ^8.2.4

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png" # Added globally for Android and iOS
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
